name: Generate GitHub Stats SVG

on:
  schedule:
    - cron: "0 2 * * *"  # her gün 02:00 UTC
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure profile directory exists
        run: mkdir -p profile

      - name: Generate Stats Card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: >
            username=Jessitoii
            &show_icons=true
            &hide_border=true
            &include_all_commits=true
            &count_private=true
            &theme=transparent
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages Card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: top-langs
          options: >
            username=Jessitoii
            &layout=compact
            &hide_border=true
            &langs_count=6
            &size_weight=0.5
            &count_weight=0.5
            &theme=transparent
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --cached --quiet || git commit -m "Update stats cards"
          git push
